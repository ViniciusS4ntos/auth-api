spring.application.name=auth-api

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tokenTeste}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:2006}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}

# ExpirańŃo do token
token-Expiration=36000

server.tomcat.relaxed-query-chars=|,{,},[,]